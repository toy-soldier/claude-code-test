<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      letter-spacing: 2px;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.8rem;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      box-shadow: 0 0 18px rgba(233, 69, 96, 0.6);
    }

    #controls {
      margin-top: 2rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      padding: 0.6rem 1.4rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.85; }

    #resetBtn {
      background: #e94560;
      color: #fff;
    }

    #modeBtn {
      background: #0f3460;
      color: #a8dadc;
      border: 2px solid #a8dadc;
    }

    #score {
      margin-top: 1.5rem;
      display: flex;
      gap: 2rem;
      font-size: 1rem;
      color: #888;
    }

    .score-item span {
      font-size: 1.4rem;
      font-weight: bold;
      color: #eee;
    }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div id="status">Player X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <div id="controls">
    <button id="resetBtn">New Game</button>
    <button id="modeBtn">vs Computer</button>
  </div>

  <div id="score">
    <div class="score-item">X wins: <span id="xWins">0</span></div>
    <div class="score-item">Draws: <span id="draws">0</span></div>
    <div class="score-item">O wins: <span id="oWins">0</span></div>
  </div>

  <script>
    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

    let board, current, gameOver, vsComputer;
    let scores = { X: 0, O: 0, D: 0 };

    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');
    const modeBtn = document.getElementById('modeBtn');

    vsComputer = false;

    function init() {
      board = Array(9).fill('');
      current = 'X';
      gameOver = false;
      cells.forEach(c => { c.textContent = ''; c.className = 'cell'; });
      setStatus(`Player X's turn`);
    }

    function setStatus(msg) { status.textContent = msg; }

    function checkWin(b, p) {
      return WINS.find(([a, bb, c]) => b[a] === p && b[bb] === p && b[c] === p) || null;
    }

    function isDraw(b) { return b.every(v => v !== ''); }

    function highlight(combo) {
      combo.forEach(i => cells[i].classList.add('win'));
    }

    function play(i) {
      if (gameOver || board[i]) return;
      board[i] = current;
      cells[i].textContent = current;
      cells[i].classList.add(current.toLowerCase(), 'taken');

      const win = checkWin(board, current);
      if (win) {
        highlight(win);
        setStatus(`Player ${current} wins!`);
        scores[current]++;
        updateScore();
        gameOver = true;
        return;
      }
      if (isDraw(board)) {
        setStatus("It's a draw!");
        scores.D++;
        updateScore();
        gameOver = true;
        return;
      }

      current = current === 'X' ? 'O' : 'X';

      if (vsComputer && current === 'O') {
        setStatus('Computer thinking...');
        setTimeout(computerMove, 300);
      } else {
        setStatus(`Player ${current}'s turn`);
      }
    }

    function computerMove() {
      const move = bestMove(board);
      play(move);
    }

    function minimax(b, isMax) {
      const winner = checkWin(b, 'O') ? 1 : checkWin(b, 'X') ? -1 : 0;
      if (winner !== 0) return winner;
      if (isDraw(b)) return 0;

      let best = isMax ? -Infinity : Infinity;
      for (let i = 0; i < 9; i++) {
        if (!b[i]) {
          b[i] = isMax ? 'O' : 'X';
          const score = minimax(b, !isMax);
          b[i] = '';
          best = isMax ? Math.max(best, score) : Math.min(best, score);
        }
      }
      return best;
    }

    function bestMove(b) {
      let best = -Infinity, move = -1;
      for (let i = 0; i < 9; i++) {
        if (!b[i]) {
          b[i] = 'O';
          const score = minimax(b, false);
          b[i] = '';
          if (score > best) { best = score; move = i; }
        }
      }
      return move;
    }

    function updateScore() {
      document.getElementById('xWins').textContent = scores.X;
      document.getElementById('oWins').textContent = scores.O;
      document.getElementById('draws').textContent = scores.D;
    }

    cells.forEach(cell => cell.addEventListener('click', () => {
      if (vsComputer && current === 'O') return;
      play(+cell.dataset.i);
    }));

    document.getElementById('resetBtn').addEventListener('click', init);

    modeBtn.addEventListener('click', () => {
      vsComputer = !vsComputer;
      modeBtn.textContent = vsComputer ? 'vs Human' : 'vs Computer';
      scores = { X: 0, O: 0, D: 0 };
      updateScore();
      init();
    });

    init();
  </script>
</body>
</html>
