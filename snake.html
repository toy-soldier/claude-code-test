<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Courier New', monospace;
  }

  #phone {
    background: #2a2a2a;
    border-radius: 24px;
    padding: 20px 16px 28px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    border: 2px solid #3a3a3a;
  }

  #screen-bezel {
    background: #111;
    border-radius: 8px;
    padding: 8px;
    border: 2px solid #444;
  }

  #score-bar {
    color: #4a9e4a;
    font-size: 13px;
    text-align: center;
    margin-bottom: 4px;
    letter-spacing: 2px;
  }

  canvas {
    display: block;
    background: #8bac0f;
    image-rendering: pixelated;
  }

  #message {
    color: #4a9e4a;
    font-size: 12px;
    text-align: center;
    letter-spacing: 1px;
    min-height: 16px;
  }

  #controls {
    display: grid;
    grid-template-columns: repeat(3, 40px);
    grid-template-rows: repeat(3, 40px);
    gap: 4px;
  }

  .btn {
    background: #3a3a3a;
    border: none;
    border-radius: 6px;
    color: #aaa;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 3px 0 #222;
    transition: transform 0.1s, box-shadow 0.1s;
    user-select: none;
  }

  .btn:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 #222;
  }

  .btn-up    { grid-column: 2; grid-row: 1; }
  .btn-left  { grid-column: 1; grid-row: 2; }
  .btn-ok    { grid-column: 2; grid-row: 2; background: #4a9e4a; color: #fff; font-size: 11px; font-weight: bold; }
  .btn-right { grid-column: 3; grid-row: 2; }
  .btn-down  { grid-column: 2; grid-row: 3; }
</style>
</head>
<body>

<div id="phone">
  <div id="screen-bezel">
    <div id="score-bar">SCORE: <span id="score">0</span> &nbsp; HI: <span id="hi">0</span></div>
    <canvas id="canvas" width="360" height="360"></canvas>
    <div id="message">Press OK to start</div>
  </div>

  <div id="controls">
    <button class="btn btn-up"    id="btn-up">▲</button>
    <button class="btn btn-left"  id="btn-left">◀</button>
    <button class="btn btn-ok"    id="btn-ok">OK</button>
    <button class="btn btn-right" id="btn-right">▶</button>
    <button class="btn btn-down"  id="btn-down">▼</button>
  </div>
</div>

<script>
const canvas  = document.getElementById('canvas');
const ctx     = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const hiEl    = document.getElementById('hi');
const msgEl   = document.getElementById('message');

const COLS = 20, ROWS = 20, CELL = 18;
const COLORS = {
  bg:    '#8bac0f',
  grid:  '#9bbc0f',
  snake: '#0f380f',
  head:  '#1a5a1a',
  food:  '#0f380f',
};

let snake, dir, nextDir, food, score, hiScore = 0, loop, running = false;

function init() {
  snake = [{x:10, y:10}, {x:9, y:10}, {x:8, y:10}];
  dir = {x:1, y:0};
  nextDir = {x:1, y:0};
  score = 0;
  scoreEl.textContent = 0;
  placeFood();
  draw();
}

function placeFood() {
  let pos;
  do {
    pos = { x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS) };
  } while (snake.some(s => s.x===pos.x && s.y===pos.y));
  food = pos;
}

function step() {
  dir = nextDir;
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // Wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    return gameOver();
  }
  // Self collision
  if (snake.some(s => s.x===head.x && s.y===head.y)) {
    return gameOver();
  }

  snake.unshift(head);

  if (head.x===food.x && head.y===food.y) {
    score++;
    scoreEl.textContent = score;
    if (score > hiScore) { hiScore = score; hiEl.textContent = hiScore; }
    placeFood();
  } else {
    snake.pop();
  }

  draw();
}

function draw() {
  ctx.fillStyle = COLORS.bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Subtle grid
  ctx.fillStyle = COLORS.grid;
  for (let x = 0; x < COLS; x++) {
    for (let y = 0; y < ROWS; y++) {
      ctx.fillRect(x*CELL+1, y*CELL+1, CELL-1, CELL-1);
    }
  }

  // Food (blinking dot)
  ctx.fillStyle = COLORS.food;
  const fx = food.x*CELL, fy = food.y*CELL;
  ctx.beginPath();
  ctx.arc(fx+CELL/2, fy+CELL/2, CELL/2-1, 0, Math.PI*2);
  ctx.fill();

  // Snake body
  ctx.fillStyle = COLORS.snake;
  for (let i = 1; i < snake.length; i++) {
    ctx.fillRect(snake[i].x*CELL+1, snake[i].y*CELL+1, CELL-1, CELL-1);
  }
  // Head (slightly different shade)
  ctx.fillStyle = COLORS.head;
  ctx.fillRect(snake[0].x*CELL, snake[0].y*CELL, CELL, CELL);
}

function gameOver() {
  clearInterval(loop);
  running = false;
  msgEl.textContent = 'GAME OVER — OK to restart';
  // Flash the snake red briefly
  ctx.fillStyle = '#500';
  snake.forEach(s => ctx.fillRect(s.x*CELL, s.y*CELL, CELL, CELL));
}

function start() {
  clearInterval(loop);
  running = true;
  msgEl.textContent = 'Arrow keys or buttons';
  init();
  const speed = 250;
  loop = setInterval(step, speed);
}

// Keyboard
document.addEventListener('keydown', e => {
  if (!running && e.key === 'Enter') return start();
  const map = {
    ArrowUp:    {x:0,  y:-1},
    ArrowDown:  {x:0,  y:1},
    ArrowLeft:  {x:-1, y:0},
    ArrowRight: {x:1,  y:0},
  };
  if (map[e.key]) {
    const d = map[e.key];
    // Prevent reversing
    if (d.x !== -dir.x || d.y !== -dir.y) nextDir = d;
    e.preventDefault();
  }
});

// On-screen buttons
document.getElementById('btn-up').addEventListener('click',    () => { if(running && dir.y===0) nextDir={x:0,y:-1}; });
document.getElementById('btn-down').addEventListener('click',  () => { if(running && dir.y===0) nextDir={x:0,y:1}; });
document.getElementById('btn-left').addEventListener('click',  () => { if(running && dir.x===0) nextDir={x:-1,y:0}; });
document.getElementById('btn-right').addEventListener('click', () => { if(running && dir.x===0) nextDir={x:1,y:0}; });
document.getElementById('btn-ok').addEventListener('click',    () => start());

init();
</script>
</body>
</html>
