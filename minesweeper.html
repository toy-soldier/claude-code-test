<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minesweeper</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a3a6e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
  }

  #difficulty {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }

  .diff-btn {
    background: #c0c0c0;
    border: 2px solid;
    border-color: #fff #808080 #808080 #fff;
    padding: 5px 12px;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    font-weight: bold;
    color: #000;
  }

  .diff-btn:active, .diff-btn.active {
    border-color: #808080 #fff #fff #808080;
  }

  #game {
    background: #c0c0c0;
    border: 4px solid;
    border-color: #fff #808080 #808080 #fff;
    padding: 10px;
  }

  #header {
    background: #c0c0c0;
    border: 3px solid;
    border-color: #808080 #fff #fff #808080;
    padding: 6px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .led-display {
    background: #000;
    color: #f00;
    font-family: 'Courier New', monospace;
    font-size: 28px;
    font-weight: bold;
    padding: 2px 6px;
    min-width: 60px;
    text-align: right;
    letter-spacing: 3px;
    border: 2px solid;
    border-color: #808080 #fff #fff #808080;
  }

  #face-btn {
    background: #c0c0c0;
    border: 3px solid;
    border-color: #fff #808080 #808080 #fff;
    width: 42px;
    height: 42px;
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #face-btn:active {
    border-color: #808080 #fff #fff #808080;
  }

  #board {
    border: 3px solid;
    border-color: #808080 #fff #fff #808080;
    display: inline-block;
    line-height: 0;
  }

  .row { display: flex; }

  .cell {
    width: 32px;
    height: 32px;
    background: #c0c0c0;
    border: 2px solid;
    border-color: #fff #808080 #808080 #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    flex-shrink: 0;
    user-select: none;
  }

  .cell.revealed {
    border: 1px solid #808080;
    background: #c0c0c0;
    cursor: default;
  }

  .cell.mine-hit { background: #f00; }

  .n1 { color: #0000ff; }
  .n2 { color: #008000; }
  .n3 { color: #ff0000; }
  .n4 { color: #000080; }
  .n5 { color: #800000; }
  .n6 { color: #008080; }
  .n7 { color: #000; }
  .n8 { color: #808080; }
</style>
</head>
<body>

<div id="difficulty">
  <button class="diff-btn active" onclick="setDifficulty(9,9,10,this)">Beginner</button>
  <button class="diff-btn" onclick="setDifficulty(16,16,40,this)">Intermediate</button>
  <button class="diff-btn" onclick="setDifficulty(30,16,99,this)">Expert</button>
</div>

<div id="game">
  <div id="header">
    <div class="led-display" id="mine-count">010</div>
    <button id="face-btn" onclick="newGame()">🙂</button>
    <div class="led-display" id="timer">000</div>
  </div>
  <div id="board"></div>
</div>

<script>
let COLS = 9, ROWS = 9, MINES = 10;
let board, revealed, flagged, mineCount, timerVal, timerInterval, gameOver, firstClick;

function setDifficulty(cols, rows, mines, btn) {
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  COLS = cols; ROWS = rows; MINES = mines;
  newGame();
}

function newGame() {
  clearInterval(timerInterval);
  gameOver = false;
  firstClick = true;
  mineCount = MINES;
  timerVal = 0;

  board    = Array.from({length: ROWS}, () => Array(COLS).fill(0));
  revealed = Array.from({length: ROWS}, () => Array(COLS).fill(false));
  flagged  = Array.from({length: ROWS}, () => Array(COLS).fill(false));

  document.getElementById('mine-count').textContent = String(mineCount).padStart(3, '0');
  document.getElementById('timer').textContent = '000';
  document.getElementById('face-btn').textContent = '🙂';

  renderBoard();
}

function placeMines(safeRow, safeCol) {
  let placed = 0;
  while (placed < MINES) {
    const r = Math.floor(Math.random() * ROWS);
    const c = Math.floor(Math.random() * COLS);
    if (board[r][c] === -1) continue;
    if (Math.abs(r - safeRow) <= 1 && Math.abs(c - safeCol) <= 1) continue;
    board[r][c] = -1;
    placed++;
  }
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++) {
      if (board[r][c] === -1) continue;
      let count = 0;
      for (let dr = -1; dr <= 1; dr++)
        for (let dc = -1; dc <= 1; dc++) {
          const nr = r+dr, nc = c+dc;
          if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && board[nr][nc] === -1) count++;
        }
      board[r][c] = count;
    }
}

function renderBoard() {
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';
  for (let r = 0; r < ROWS; r++) {
    const rowEl = document.createElement('div');
    rowEl.className = 'row';
    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.r = r;
      cell.dataset.c = c;
      cell.addEventListener('click', handleClick);
      cell.addEventListener('contextmenu', handleRightClick);
      rowEl.appendChild(cell);
    }
    boardEl.appendChild(rowEl);
  }
}

function getCell(r, c) {
  return document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
}

function updateCell(r, c) {
  const cell = getCell(r, c);
  if (!cell) return;
  cell.className = 'cell';
  cell.textContent = '';

  if (revealed[r][c]) {
    cell.classList.add('revealed');
    const val = board[r][c];
    if (val === -1) {
      cell.textContent = '💣';
    } else if (val > 0) {
      cell.textContent = val;
      cell.classList.add(`n${val}`);
    }
  } else if (flagged[r][c]) {
    cell.textContent = '🚩';
  }
}

function handleClick() {
  if (gameOver) return;
  const r = parseInt(this.dataset.r), c = parseInt(this.dataset.c);
  if (flagged[r][c] || revealed[r][c]) return;

  if (firstClick) {
    firstClick = false;
    placeMines(r, c);
    timerInterval = setInterval(() => {
      timerVal = Math.min(999, timerVal + 1);
      document.getElementById('timer').textContent = String(timerVal).padStart(3, '0');
    }, 1000);
  }

  if (board[r][c] === -1) {
    revealed[r][c] = true;
    const cell = getCell(r, c);
    cell.classList.add('revealed', 'mine-hit');
    cell.textContent = '💣';
    revealAllMines(r, c);
    gameOver = true;
    clearInterval(timerInterval);
    document.getElementById('face-btn').textContent = '😵';
    return;
  }

  flood(r, c);
  checkWin();
}

function handleRightClick(e) {
  e.preventDefault();
  if (gameOver) return;
  const r = parseInt(this.dataset.r), c = parseInt(this.dataset.c);
  if (revealed[r][c]) return;
  flagged[r][c] = !flagged[r][c];
  mineCount += flagged[r][c] ? -1 : 1;
  document.getElementById('mine-count').textContent = String(mineCount).padStart(3, '0');
  updateCell(r, c);
}

function flood(r, c) {
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return;
  if (revealed[r][c] || flagged[r][c]) return;
  revealed[r][c] = true;
  updateCell(r, c);
  if (board[r][c] === 0)
    for (let dr = -1; dr <= 1; dr++)
      for (let dc = -1; dc <= 1; dc++)
        flood(r+dr, c+dc);
}

function revealAllMines(hitR, hitC) {
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (board[r][c] === -1 && !(r === hitR && c === hitC)) {
        revealed[r][c] = true;
        updateCell(r, c);
      }
}

function checkWin() {
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (!revealed[r][c] && board[r][c] !== -1) return;

  gameOver = true;
  clearInterval(timerInterval);
  document.getElementById('face-btn').textContent = '😎';
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (board[r][c] === -1) { flagged[r][c] = true; updateCell(r, c); }
  document.getElementById('mine-count').textContent = '000';
}

newGame();
</script>
</body>
</html>
